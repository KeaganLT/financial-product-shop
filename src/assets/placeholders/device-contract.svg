<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 289" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="289" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C1C3A"/>
      <stop offset="100%" stop-color="#2B5797"/>
    </linearGradient>
  </defs>
  <rect width="400" height="289" fill="url(#bg)"/>
  <!-- Glow circles -->
  <circle cx="200" cy="144" r="100" fill="#1AB0DE" fill-opacity="0.08"/>
  <circle cx="200" cy="144" r="65" fill="#1AB0DE" fill-opacity="0.07"/>
  <!-- Phone outline -->
  <rect x="166" y="62" width="68" height="116" rx="10" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Screen -->
  <rect x="172" y="74" width="56" height="88" rx="4" fill="white" fill-opacity="0.1"/>
  <!-- Home button -->
  <circle cx="200" cy="166" r="5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Screen content lines -->
  <rect x="179" y="83" width="40" height="3" rx="1.5" fill="white" fill-opacity="0.5"/>
  <rect x="179" y="92" width="30" height="3" rx="1.5" fill="white" fill-opacity="0.35"/>
  <rect x="179" y="110" width="40" height="22" rx="3" fill="white" fill-opacity="0.15"/>
  <path d="M192 118 L196 124 L208 112" stroke="#1AB0DE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal dots -->
  <circle cx="176" cy="184" r="3" fill="#1AB0DE" fill-opacity="0.9"/>
  <circle cx="186" cy="184" r="3" fill="#1AB0DE" fill-opacity="0.6"/>
  <circle cx="196" cy="184" r="3" fill="#1AB0DE" fill-opacity="0.3"/>
  <text x="200" y="212" text-anchor="middle" font-family="Roboto, sans-serif" font-size="13" fill="white" fill-opacity="0.8" font-weight="500" letter-spacing="2">DEVICE CONTRACT</text>
</svg>
