  <circle cx="200" cy="122" r="18" fill="white" fill-opacity="0.9"/>
  <path d="M170 172 C170 155 183 145 200 145 C217 145 230 155 230 172" fill="white" fill-opacity="0.9"/>
  <!-- Label -->
  <text x="200" y="254" text-anchor="middle" font-family="Roboto, sans-serif" font-size="13" fill="white" fill-opacity="0.8" font-weight="500" letter-spacing="2">RETAIL INSURANCE</text>
</svg>
