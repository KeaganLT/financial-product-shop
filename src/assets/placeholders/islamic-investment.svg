<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 289" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="289" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#062A1E"/>
      <stop offset="55%" stop-color="#0B4332"/>
      <stop offset="100%" stop-color="#0E5A44"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="200" cy="115" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8B400" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C8B400" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="400" height="289" fill="url(#bg)"/>

  <!-- Deep glow behind crescent -->
  <circle cx="200" cy="115" r="85" fill="url(#moonGlow)" filter="url(#softBlur)"/>

  <!-- 12-point geometric star pattern (background) -->
  <g transform="translate(200,115)" opacity="0.12">
    <polygon points="0,-95 11,-26 55,-77 26,-11 95,0 26,11 55,77 11,26 0,95 -11,26 -55,77 -26,11 -95,0 -26,-11 -55,-77 -11,-26" fill="none" stroke="white" stroke-width="0.8"/>
    <polygon points="0,-72 19,-19 72,0 19,19 0,72 -19,19 -72,0 -19,-19" fill="none" stroke="white" stroke-width="0.8"/>
    <polygon points="0,-50 14,-14 50,0 14,14 0,50 -14,14 -50,0 -14,-14" fill="none" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Crescent moon glow (blurred behind) -->
  <circle cx="200" cy="115" r="60" fill="#C8B400" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Crescent moon — outer circle -->
  <circle cx="200" cy="115" r="60" fill="none" stroke="#E8CC30" stroke-width="2.5" stroke-opacity="0.9"/>
  <!-- Crescent moon — inner cutout circle (same colour as bg) -->
  <circle cx="222" cy="100" r="50" fill="#0B4332"/>

  <!-- 8-point star (right of crescent) -->
  <g transform="translate(268, 80)">
    <!-- Outer 8 points -->
    <polygon points="0,-18 4.7,-4.7 18,0 4.7,4.7 0,18 -4.7,4.7 -18,0 -4.7,-4.7" fill="#E8CC30" fill-opacity="0.95"/>
    <polygon points="0,-18 4.7,-4.7 18,0 4.7,4.7 0,18 -4.7,4.7 -18,0 -4.7,-4.7" fill="#E8CC30" fill-opacity="0.95" transform="rotate(45)"/>
    <!-- Centre -->
    <circle cx="0" cy="0" r="5" fill="#FFF176"/>
  </g>

  <!-- Small decorative stars -->
  <g transform="translate(128, 68)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#E8CC30" fill-opacity="0.6"/>
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#E8CC30" fill-opacity="0.6" transform="rotate(45)"/>
  </g>
  <g transform="translate(310, 155)">
    <polygon points="0,-7 1.8,-1.8 7,0 1.8,1.8 0,7 -1.8,1.8 -7,0 -1.8,-1.8" fill="#E8CC30" fill-opacity="0.5"/>
    <polygon points="0,-7 1.8,-1.8 7,0 1.8,1.8 0,7 -1.8,1.8 -7,0 -1.8,-1.8" fill="#E8CC30" fill-opacity="0.5" transform="rotate(45)"/>
  </g>
  <circle cx="155" cy="165" r="2" fill="#E8CC30" fill-opacity="0.4"/>
  <circle cx="82" cy="130" r="1.5" fill="#E8CC30" fill-opacity="0.3"/>
  <circle cx="340" cy="95" r="1.5" fill="#E8CC30" fill-opacity="0.35"/>
  <circle cx="90" cy="195" r="2" fill="#E8CC30" fill-opacity="0.25"/>
  <circle cx="330" cy="200" r="1.5" fill="#E8CC30" fill-opacity="0.25"/>

  <!-- Ornamental border arches (top) -->
  <path d="M0 30 Q50 0 100 30 Q150 0 200 30 Q250 0 300 30 Q350 0 400 30" stroke="#E8CC30" stroke-width="0.8" stroke-opacity="0.25" fill="none"/>

  <!-- Gold divider line with ornament -->
  <line x1="80" y1="205" x2="170" y2="205" stroke="#C8B400" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="200" cy="205" r="5" fill="#C8B400" fill-opacity="0.7"/>
  <polygon points="200,200 202,205 200,210 198,205" fill="#E8CC30" fill-opacity="0.9"/>
  <line x1="230" y1="205" x2="320" y2="205" stroke="#C8B400" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Label -->
  <rect x="0" y="255" width="400" height="34" fill="black" fill-opacity="0.35"/>
  <text x="200" y="277" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="12" fill="#E8CC30" fill-opacity="0.9" font-weight="600" letter-spacing="3">ISLAMIC INVESTMENT</text>
</svg>
